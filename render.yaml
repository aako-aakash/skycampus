# Render deployment config
# Note: rootDirectory is set in the Render dashboard, not here
services:
  - type: web
    name: skycampus-ai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
